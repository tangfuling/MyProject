<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公众号运营助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup-shell">
    <div class="popup-card">
      <header class="popup-header">
        <div class="popup-header-icon">
          <img src="icons/icon-32.png" alt="公众号运营助手" />
        </div>
        <div class="popup-header-text">
          <div class="htitle">公众号运营助手</div>
          <div class="hsub">v2.0 · Chrome Extension</div>
        </div>
        <span id="stateLabel" class="badge badge-warning">待同步</span>
      </header>

      <section id="stateView" class="popup-body"></section>

      <div class="progress-wrap">
        <div class="progress-head">
          <span id="progressTitle">同步进度</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill" style="width:0%"></div>
        </div>
        <div id="statusText" class="status-text">等待同步</div>
        <div id="countText" class="count-text"></div>
        <div id="stepText" class="step-text"></div>
        <div id="summaryText" class="summary-text"></div>
      </div>

      <div class="range-row">
        <label class="range-label" for="syncRange">同步范围</label>
        <select id="syncRange" class="field-input range-select">
          <option value="7d">最近7天</option>
          <option value="30d">最近30天</option>
          <option value="60d">最近60天</option>
          <option value="90d">最近90天</option>
          <option value="all">全部</option>
        </select>
      </div>

      <div class="action-row">
        <button id="primaryBtn" class="btn btn-primary" type="button">开始同步</button>
        <button id="secondaryBtn" class="btn btn-outline" type="button">前往运营助手</button>
      </div>

      <details class="advanced">
        <summary>高级配置</summary>
        <label class="field-label" for="apiBase">后端 API 地址</label>
        <input id="apiBase" class="field-input" placeholder="请输入后端 API 地址" />
        <label class="field-label" for="webBase">Web 地址</label>
        <input id="webBase" class="field-input" placeholder="http://localhost:5173" />
        <label class="field-label" for="authToken">Web 登录 JWT</label>
        <textarea id="authToken" class="field-input field-area" placeholder="登录 Web 后可自动同步，如需手动可粘贴 token"></textarea>
        <button id="saveBtn" class="btn btn-ghost" type="button">保存配置</button>
      </details>
    </div>
  </main>

  <script src="http-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
