server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: gzh-java
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/gzh?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  security:
    jwt-secret: ${JWT_SECRET:please-change-me-to-32-bytes-at-least}
    jwt-expire-days: ${JWT_EXPIRE_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,chrome-extension://*}
  sms:
    endpoint: ${SMS_ENDPOINT:https://sms.example.com/send}
    api-key: ${SMS_API_KEY:}
    api-secret: ${SMS_API_SECRET:}
    sign-name: ${SMS_SIGN_NAME:公众号助手}
    template-code: ${SMS_TEMPLATE_CODE:SMS_000000001}
  ai:
    default-model: ${AI_DEFAULT_MODEL:qwen_3_5}
    timeout-ms: ${AI_TIMEOUT_MS:90000}
    qwen35:
      endpoint: ${QWEN35_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      api-key: ${QWEN35_API_KEY:sk-050a5b5511074c36a17dfc5d98fd1b57}
      model: ${QWEN35_MODEL:qwen3.5-flash}
    qwen36:
      endpoint: ${QWEN36_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      api-key: ${QWEN36_API_KEY:sk-050a5b5511074c36a17dfc5d98fd1b57}
      model: ${QWEN36_MODEL:qwen3.6-plus}
    doubao:
      endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
      api-key: ${DOUBAO_API_KEY:}
      model: ${DOUBAO_MODEL:doubao-seed-1-6-thinking-250715}
    gpt:
      endpoint: ${GPT_ENDPOINT:https://api.openai.com/v1/chat/completions}
      api-key: ${GPT_API_KEY:}
      model: ${GPT_MODEL:gpt-4o-mini}
    claude:
      endpoint: ${CLAUDE_ENDPOINT:https://api.anthropic.com/v1/messages}
      api-key: ${CLAUDE_API_KEY:}
      model: ${CLAUDE_MODEL:claude-3-5-sonnet-latest}
    pricing:
      charge-multiplier: ${AI_PRICING_MULTIPLIER:5}
      models:
        qwen_3_5:
          tiers:
            - max-input-tokens: 131072
              input-per-million-cent: 20
              output-per-million-cent: 200
            - max-input-tokens: 262144
              input-per-million-cent: 80
              output-per-million-cent: 800
            - max-input-tokens: 1000000
              input-per-million-cent: 120
              output-per-million-cent: 1200
        qwen_3_6:
          tiers:
            - max-input-tokens: 262144
              input-per-million-cent: 200
              output-per-million-cent: 1200
            - max-input-tokens: 1000000
              input-per-million-cent: 800
              output-per-million-cent: 4800
  payment:
    alipay:
      gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
      app-id: ${ALIPAY_APP_ID:2021003148624515}
      private-key: ${ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
      notify-url: ${ALIPAY_NOTIFY_URL:https://api-gzh.niuma.com/payment/notify}
      return-url: ${ALIPAY_RETURN_URL:https://gzh.niuma.com/settings}
  upload:
    avatar-dir: ${AVATAR_UPLOAD_DIR:./storage/avatars}
    avatar-url-prefix: ${AVATAR_UPLOAD_URL_PREFIX:/uploads/avatars}
